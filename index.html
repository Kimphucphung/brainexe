  .font-mono { font-family: 'JetBrains Mono', monospace; }

  .paper-lg {
    background: var(--paper);

    box-shadow: var(--shadow-lg);
  }
  .btn-press {
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .btn-press:active {
    transform: translate(2px, 2px);
    box-shadow: 0 0 0 var(--line) !important;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--fg-secondary); border-radius: 4px; }

  @keyframes catBob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(2deg); }
  }
  @keyframes catBlink {
    0%, 92%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes flower-bloom {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    50% { transform: scale(1.2) rotate(0deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes scroll-marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideRight {
    from { opacity: 0; transform: translateX(-40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent); }
    50% { box-shadow: 0 0 0 20px transparent; }
  }
  @keyframes bounce-in {
    0% { transform: scale(0); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes shimmer {
    0% { background-position: -1000px 0; }
    100% { background-position: 1000px 0; }
  }
  .animate-float { animation: float 3s ease-in-out infinite; }
  .animate-wiggle { animation: wiggle 0.4s ease-in-out infinite; }
  .animate-spin-slow { animation: spin-slow 8s linear infinite; }
  .marquee { animation: scroll-marquee 30s linear infinite; }

  /* scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-delay-1.visible { transition-delay: 0.1s; }
  .reveal-delay-2.visible { transition-delay: 0.2s; }
  .reveal-delay-3.visible { transition-delay: 0.3s; }
  .reveal-delay-4.visible { transition-delay: 0.4s; }

  ::selection { background: var(--accent); color: var(--paper); }

  .page-enter {
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .messy-rotate-1 { transform: rotate(-2deg); }
  .messy-rotate-2 { transform: rotate(1.5deg); }
  .messy-rotate-3 { transform: rotate(-1deg); }
  .messy-rotate-4 { transform: rotate(2deg); }

  .timer-ring {
    transform: rotate(-90deg);
    transition: stroke-dashoffset 1s linear;
  }

  .custom-check {
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--line);
    background: var(--paper);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .custom-check.checked {
    background: var(--accent);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    background: var(--fg);
    height: 2px;
  }
  input[type="range"]::-moz-range-track {
    background: var(--fg);
    height: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    margin-top: -9px;
    background-color: var(--accent);
    height: 20px;
    width: 20px;
    border: 1.5px solid var(--line);
  }
  input[type="range"]::-moz-range-thumb {
    border: 1.5px solid var(--line);
    background-color: var(--accent);
    height: 20px;
    width: 20px;
  }

  @media (max-width: 640px) {
    body { background-size: 16px 16px; }
  }

  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .fade-in { animation: fadeIn 0.4s ease; }

  .speech-bubble {
    position: relative;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    padding: 10px 14px;
    box-shadow: var(--shadow-sm);
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 20px;
    width: 14px;
    height: 14px;
    background: var(--paper);
    border-right: 1.5px solid var(--line);
    border-bottom: 1.5px solid var(--line);
    transform: rotate(45deg);
  }

  /* hero blob */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    z-index: 0;
    pointer-events: none;
  }

  /* big text underline */
  .underline-marker {
    position: relative;
    display: inline-block;
  }
  .underline-marker::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: -4px;
    right: -4px;
    height: 12px;
    background: var(--accent);
    opacity: 0.4;
    z-index: -1;
  }

  /* tilted stickers */
  .sticker {
    transform: rotate(-3deg);
    transition: transform 0.3s;
  }
  .sticker:hover {
    transform: rotate(0deg) scale(1.05);
  }

  .wavy-divider {
    background-image:

  .shine-btn {
    position: relative;
    overflow: hidden;
  }
  .shine-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }
  .shine-btn:hover::before {
    left: 100%;
  }

  /* parallax stickers */
  .parallax-bg {
    will-change: transform;
  }

/* =================================================================
   MESSY LAYOUT STATES HELPERS
================================================================= */
const getMessyStyle = (messyLevel, seed = 1) => {
  const level = Math.min(5, Math.max(1, messyLevel));
  if (level <= 1) return {};

  const rotations = {
    2: [-0.6, 0.6, -0.4, 0.5],     // cozy: very subtle
    3: [-1.2, 1.3, -1.0, 1.1],     // casual: mild
    4: [-2.2, 2.5, -2.0, 2.3],     // messy: moderate
    5: [-3.5, 4.0, -3.8, 3.6],     // chaos: heavy
  };

  const baseRot = rotations[level]?.[(seed - 1) % 4] || 0;

  if (level === 5) {
    const shiftsX = [-12, 15, -8, 10, -15, 6, -5, 12];
    const shiftsY = [8, -10, 5, -8, 9, -6, 7, -9];
    const shiftX = shiftsX[(seed - 1) % shiftsX.length];
    const shiftY = shiftsY[(seed - 1) % shiftsY.length];
    return {
      transform: `rotate(${baseRot}deg) translate(${shiftX}px, ${shiftY}px)`,
      position: 'relative',
      zIndex: (seed % 10),
    };
  }

  return {
    transform: `rotate(${baseRot}deg)`,
  };
};

const getMessyLabel = (messyLevel, lang) => {
  const level = Math.min(5, Math.max(1, messyLevel));
  if (lang === 'vi') {
    const labels = {
      1: 'gọn gàng',
      2: 'ngăn nắp',
      3: 'vừa phải',
      4: 'lộn xộn',
      5: 'hỗn loạn'
    };
    return labels[level];
  } else {
    const labels = {
      1: 'clean',
      2: 'cozy',
      3: 'casual',
      4: 'messy',
      5: 'chaos'
    };
    return labels[level];
  }
};

/* =================================================================
   STORAGE — namespaced by user, persist to localStorage
================================================================= */
const STORAGE_KEY = 'brain_exe_v2';

const getStore = () => {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch { return {}; }
};
const saveStore = (s) => {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  } catch (e) { console.warn('storage full', e); }
};

const useUserStorage = (userId, key, defaultVal) => {
  const fullKey = userId ? `${userId}::${key}` : `__guest::${key}`;
  const [val, setVal] = useState(() => {
    const store = getStore();
    return store[fullKey] !== undefined ? store[fullKey] : defaultVal;
  });
  useEffect(() => {
    const store = getStore();
    store[fullKey] = val;
    saveStore(store);
  }, [fullKey, val]);
  return [val, setVal];
};

const useGlobalStorage = (key, defaultVal) => {
  const [val, setVal] = useState(() => {
    const store = getStore();
    return store[`__global::${key}`] !== undefined ? store[`__global::${key}`] : defaultVal;
  });
  useEffect(() => {
    const store = getStore();
    store[`__global::${key}`] = val;
    saveStore(store);
  }, [key, val]);
  return [val, setVal];
};

/* =================================================================
   SOUND SYSTEM — web audio for click sounds
================================================================= */
let audioCtx = null;
const getAudio = () => {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
  }
  return audioCtx;
};
const playClick = (enabled, type = 'click') => {
  if (!enabled) return;
  const ctx = getAudio();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'success') {
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.08);
    } else if (type === 'pop') {
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.05);
    } else {
      osc.frequency.setValueAtTime(520, ctx.currentTime);
    }
    gain.gain.setValueAtTime(0.05, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.1);
  } catch {}
};

const hashPassword = (pw) => {
  // simple hash for demo. PRODUCTION: use bcrypt server-side via Supabase auth.
  let h = 0;
  for (let i = 0; i < pw.length; i++) {
    h = ((h << 5) - h) + pw.charCodeAt(i);
    h |= 0;
  }
  return `h_${Math.abs(h).toString(36)}`;
};

  signup: (email, password, name) => {
    const store = getStore();
    const users = store['__users'] || {};
    if (users[email]) return { error: 'email already exists' };
    const userId = `u_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
    users[email] = { userId, email, name, pw: hashPassword(password), createdAt: Date.now() };
    store['__users'] = users;
    store['__session'] = { userId, email, name };
    saveStore(store);
    return { user: { userId, email, name } };
  },
  login: (email, password) => {
    const store = getStore();
    const users = store['__users'] || {};
    const u = users[email];
    if (!u) return { error: 'no account found' };
    if (u.pw !== hashPassword(password)) return { error: 'wrong password' };
    store['__session'] = { userId: u.userId, email: u.email, name: u.name };
    saveStore(store);
    return { user: { userId: u.userId, email: u.email, name: u.name } };
  },
  getSession: () => {
    const store = getStore();
    return store['__session'] || null;
  },
  logout: () => {
    const store = getStore();
    delete store['__session'];
    saveStore(store);
  },
  updateName: (email, newName) => {
    const store = getStore();
    const users = store['__users'] || {};
    if (!users[email]) return { error: 'no account' };
    users[email].name = newName;
    store['__users'] = users;
    if (store['__session']?.email === email) {
      store['__session'].name = newName;
    }
    saveStore(store);
    return { user: { ...users[email] } };
  },
  changePassword: (email, currentPw, newPw) => {
    const store = getStore();
    const users = store['__users'] || {};
    if (!users[email]) return { error: 'no account' };
    if (users[email].pw !== hashPassword(currentPw)) return { error: 'current password is wrong' };
    if (newPw.length < 4) return { error: 'new password too short' };
    users[email].pw = hashPassword(newPw);
    store['__users'] = users;
    saveStore(store);
    return { ok: true };
  },
};

const RoamingCat = ({ message }) => {
  const [pos, setPos] = useState({ x: 50, y: 200 });
  const [target, setTarget] = useState({ x: 50, y: 200 });
  const [facing, setFacing] = useState(1);
  const [showMsg, setShowMsg] = useState(false);
  const [currentMsg, setCurrentMsg] = useState('');
  const [isPetting, setIsPetting] = useState(false);

  const messages = [
    "psst... drink water 💧",
    "look out the window?",
    "deep breath, you got this",
    "stretch! your back is calling",
    "5 mins, rest your eyes",
    "eat something soon",
    "you're doing great btw",
    "1 task at a time, k?",
    "purrr... 🐾",
    "vibe check passed ✓",
  ];

  useEffect(() => {
    const moveInterval = setInterval(() => {
      const maxX = window.innerWidth - 100;
      const maxY = window.innerHeight - 150;
      const newTarget = {
        x: Math.random() * maxX,
        y: 80 + Math.random() * (maxY - 80),
      };
      setTarget(newTarget);
      setFacing(newTarget.x > pos.x ? 1 : -1);
    }, 8000);
    return () => clearInterval(moveInterval);
  }, [pos]);

  useEffect(() => {
    const animFrame = setInterval(() => {
      setPos(p => ({
        x: p.x + (target.x - p.x) * 0.02,
        y: p.y + (target.y - p.y) * 0.02,
      }));
    }, 50);
    return () => clearInterval(animFrame);
  }, [target]);

  useEffect(() => {
    if (message) {
      setCurrentMsg(message);
      setShowMsg(true);
      const t = setTimeout(() => setShowMsg(false), 5000);
      return () => clearTimeout(t);
    }
  }, [message]);

  useEffect(() => {
    const msgInterval = setInterval(() => {
      if (Math.random() > 0.6) {
        setCurrentMsg(messages[Math.floor(Math.random() * messages.length)]);
        setShowMsg(true);
        setTimeout(() => setShowMsg(false), 5000);
      }
    }, 25000);
    return () => clearInterval(msgInterval);
  }, []);

  const handlePet = () => {
    setIsPetting(true);
    setCurrentMsg("purrr 💕");
    setShowMsg(true);
    setTimeout(() => {
      setIsPetting(false);
      setShowMsg(false);
    }, 2000);
  };

  return (
    <div
      className="fixed z-40 cursor-pointer select-none"
      style={{
        left: pos.x,
        top: pos.y,
        transform: `scaleX(${facing}) ${isPetting ? 'scale(1.1)' : ''}`,
        transition: 'transform 0.3s',
        animation: isPetting ? 'wiggle 0.3s infinite' : 'catBob 3s infinite ease-in-out',
      }}
      onClick={handlePet}
    >
      <Cat mood={isPetting ? 'party' : 'idle'} size={70}/>
      {showMsg && currentMsg && (
        <div
          className="speech-bubble absolute text-xs font-mono whitespace-nowrap"
          style={{
            top: -45,
            left: facing > 0 ? 50 : -180,
            transform: `scaleX(${facing})`,
            maxWidth: 200,
          }}
        >
          {currentMsg}
        </div>
      )}
    </div>
  );
};

/* =================================================================

================================================================= */
const useReveal = () => {
  useEffect(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });
    const els = document.querySelectorAll('.reveal');
    els.forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);
};

  const handleSubmit = () => {
    setError('');
    if (!email || !password) { setError('email + password required'); return; }

/* =================================================================
   API WIZARD (step by step setup)
================================================================= */
const ApiWizard = ({ apiKey, setApiKey, onClose, lang }) => {
  const t = useT(lang);
  const [step, setStep] = useState(1);
  const [key, setKey] = useState(apiKey || '');
  const [testStatus, setTestStatus] = useState(null); // null | 'testing' | 'ok' | 'fail'
  const [errorMsg, setErrorMsg] = useState('');

  const testKey = async () => {
    setTestStatus('testing');
    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: 'hi' }] }] }),
      });
      const d = await r.json();
      if (d.error) {
        setTestStatus('fail');
        setErrorMsg(d.error.message);
      } else {
        setTestStatus('ok');
        setApiKey(key);
      }
    } catch (e) {
      setTestStatus('fail');
      setErrorMsg(e.message);
    }
  };

  const steps = [
    {
      n: 1,
      title: t('wizard.step1.title'),
      body: t('wizard.step1.body'),
      action: (
        <a
          href="https://aistudio.google.com/api-keys"
          target="_blank"
          rel="noopener noreferrer"
          className="paper-sm btn-press inline-flex items-center gap-2 px-4 py-2 text-sm font-mono"
          style={{ background: 'var(--accent)', color: 'var(--paper)' }}
        >
          {t('wizard.step1.btn')} <Icon name="external" size={14}/>
        </a>
      ),
    },
    {
      n: 2,
      title: t('wizard.step2.title'),
      body: t('wizard.step2.body'),
      visual: (
        <div className="paper-sm p-3 inline-flex items-center gap-2 text-sm font-mono">
          <Icon name="plus" size={14}/> Create API key
        </div>
      ),
    },
    {
      n: 3,
      title: t('wizard.step3.title'),
      body: t('wizard.step3.body'),
      visual: (
        <div className="paper-sm p-3 text-xs font-mono break-all">
          AIzaSyDfqqF6xewDvE...
        </div>
      ),
    },
    {
      n: 4,
      title: t('wizard.step4.title'),
      body: t('wizard.step4.body'),
      action: (
        <div className="space-y-2">
          <input
            type="password"
            value={key}
            onChange={e => { setKey(e.target.value); setTestStatus(null); }}
            placeholder="AIza..."
            className="w-full paper-sm px-3 py-2 text-sm bg-transparent outline-none font-mono"
            style={{ background: 'var(--paper)' }}
          />
          <button
            onClick={testKey}
            disabled={!key || testStatus === 'testing'}
            className="w-full paper-sm btn-press py-2 text-sm font-mono disabled:opacity-50"
            style={{ background: testStatus === 'ok' ? '#4a8a4a' : 'var(--accent)', color: 'var(--paper)' }}
          >
            {testStatus === 'testing' ? t('wizard.testing') : testStatus === 'ok' ? t('wizard.success') : 'test & save'}
          </button>
          {testStatus === 'fail' && (
            <div className="text-xs font-mono p-2" style={{ background: 'var(--accent-soft)', color: 'var(--accent)' }}>
              {t('wizard.fail')} <br/>
              {errorMsg}
            </div>
          )}
          {testStatus === 'ok' && (
            <button onClick={onClose} className="w-full paper-sm btn-press py-2 text-sm font-mono" style={{ background: 'var(--fg)', color: 'var(--paper)' }}>
              {t('wizard.done')}
            </button>
          )}
        </div>
      ),
    },
  ];

  const currentStep = steps.find(s => s.n === step);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.6)' }}>
      <div className="paper-lg max-w-md w-full p-6 max-h-[90vh] overflow-y-auto hide-scrollbar fade-in">
        <div className="flex items-start justify-between mb-4">
          <div>
            <div className="text-xs font-mono opacity-60">🪄 ⏱ ~2 min</div>
            <div className="font-display text-2xl mt-1">{t('wizard.title')}</div>
            <div className="text-sm opacity-70 mt-1">{t('wizard.sub')}</div>
          </div>
          <button onClick={onClose} className="paper-sm btn-press p-2">
            <Icon name="x" size={14}/>

        </div>

        <div className="flex gap-1 mb-6">
          {steps.map(s => (
            <div key={s.n} className="h-1 flex-1" style={{ background: s.n <= step ? 'var(--accent)' : 'var(--bg-secondary)' }}/>
          ))}
        </div>

        <div className="mb-6">
          <div className="text-xs font-mono opacity-60 mb-2">STEP {step} OF 4</div>
          <h3 className="font-display text-3xl mb-3">{currentStep.title}</h3>
          <p className="text-sm opacity-80 mb-4 leading-relaxed">{currentStep.body}</p>

                next →

            )}
          </div>
        </div>
      </div>
    </div>
  );

const Questionnaire = ({ onComplete, lang }) => {
  const t = useT(lang);
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);

  const questions = [
    { key: 'q1', opts: [{ score: 2 }, { score: 4 }, { score: 1 }, { score: 3 }] },
    { key: 'q2', opts: [{ score: 3 }, { score: 2 }, { score: 4 }, { score: 3 }] },
    { key: 'q3', opts: [{ score: 3 }, { score: 4 }, { score: 2 }, { score: 3 }] },
    { key: 'q4', opts: [{ score: 1 }, { score: 3 }, { score: 5 }, { score: 4 }] },
  ];

  const handleAnswer = (idx) => {
    const newAnswers = [...answers, { qIdx: step, optIdx: idx, score: questions[step].opts[idx].score }];
    setAnswers(newAnswers);
    if (step < questions.length - 1) {
      setStep(step + 1);
    } else {
      const total = newAnswers.reduce((s, a) => s + a.score, 0);
      const adhdScore = Math.round((total / 20) * 10);
      const messyLevel = newAnswers[3].score;
      onComplete({ score: adhdScore, messy: messyLevel, answers: newAnswers });
    }
  };

  const current = questions[step];
  const letters = ['a', 'b', 'c', 'd'];

  return (
    <div className="min-h-screen flex items-center justify-center p-4 sm:p-8 page-enter">
      <div className="paper p-6 sm:p-10 max-w-xl w-full relative">
        <div className="absolute -top-3 left-6 paper-sm px-3 py-1 text-xs font-mono uppercase">
          {t('quiz.title')}
        </div>
        <div className="text-xs font-mono opacity-60 mb-2">0{step + 1} / 04</div>
        <h2 className="font-display text-3xl sm:text-4xl mb-8 leading-tight">{t(`quiz.${current.key}`)}</h2>
        <div className="space-y-3">
          {letters.map((letter, idx) => (
            <button
              key={idx}
              onClick={() => handleAnswer(idx)}
              className="w-full text-left paper-sm btn-press p-4 hover:bg-[var(--bg-secondary)] transition-colors flex items-center gap-4"
              style={{ background: 'var(--paper)' }}
            >
              <span className="font-mono text-xs opacity-50 w-6">0{idx + 1}</span>
              <span className="text-base sm:text-lg">{t(`quiz.${current.key}.${letter}`)}</span>
            </button>
          ))}
        </div>
        <div className="mt-8 flex items-center gap-2">
          {questions.map((_, i) => (
            <div key={i} className="h-1 flex-1" style={{ background: i <= step ? 'var(--accent)' : 'var(--bg-secondary)' }}/>
          ))}
        </div>
        <div className="absolute -bottom-16 right-0">
          <Cat mood="idle" size={60}/>
        </div>
      </div>
    </div>
  );
};

const PomodoroTimer = ({ userId, messy, lang }) => {
  const t = useT(lang);
  const [workDuration, setWorkDuration] = useUserStorage(userId, 'work_dur', 25);
  const [breakDuration, setBreakDuration] = useUserStorage(userId, 'break_dur', 5);
  const [secondsLeft, setSecondsLeft] = useState(25 * 60);
  const [isRunning, setIsRunning] = useState(false);
  const [mode, setMode] = useState('work');
  const [sessions, setSessions] = useUserStorage(userId, 'sessions', 0);
  const [showSettings, setShowSettings] = useState(false);

  useEffect(() => {
    if (!isRunning) {
      setSecondsLeft(mode === 'work' ? workDuration * 60 : breakDuration * 60);
    }
  }, [workDuration, breakDuration, mode, isRunning]);

  useEffect(() => {
    let interval;
    if (isRunning && secondsLeft > 0) {
      interval = setInterval(() => setSecondsLeft(s => s - 1), 1000);
    } else if (secondsLeft === 0) {
      setIsRunning(false);
      if (mode === 'work') {
        setSessions(s => s + 1);
        setMode('break');
        setSecondsLeft(breakDuration * 60);
      } else {
        setMode('work');
        setSecondsLeft(workDuration * 60);
      }
    }
    return () => clearInterval(interval);
  }, [isRunning, secondsLeft, mode]);

  const totalSec = (mode === 'work' ? workDuration : breakDuration) * 60;
  const progress = ((totalSec - secondsLeft) / totalSec) * 100;
  const mins = Math.floor(secondsLeft / 60);
  const secs = secondsLeft % 60;

  return (
    <div className="paper p-6 sm:p-8" style={getMessyStyle(messy, 2)}>
      <div className="flex items-center justify-between mb-4">
        <div>
          <div className="text-xs font-mono opacity-60">{t('pomo.label')}</div>
          <div className="font-display text-2xl">{mode === 'work' ? t('pomo.work') : t('pomo.break')}</div>
        </div>
        <button onClick={() => setShowSettings(!showSettings)} className="paper-sm btn-press p-2">
          <Icon name="settings"/>
        </button>
      </div>

      {showSettings && (
        <div className="paper-sm p-4 mb-4 space-y-3 fade-in">
          <div>
            <div className="flex justify-between text-xs font-mono mb-1">
              <span>{t('pomo.workTime')}</span><span>{workDuration} min</span>
            </div>
            <input type="range" min="5" max="90" value={workDuration} onChange={e => setWorkDuration(+e.target.value)} className="w-full"/>
          </div>
          <div>
            <div className="flex justify-between text-xs font-mono mb-1">
              <span>{t('pomo.breakTime')}</span><span>{breakDuration} min</span>
            </div>
            <input type="range" min="1" max="30" value={breakDuration} onChange={e => setBreakDuration(+e.target.value)} className="w-full"/>
          </div>
        </div>
      )}

      <div className="flex flex-col items-center my-6">
        <div className="relative">
          <svg width="220" height="220" viewBox="0 0 220 220">
            <circle cx="110" cy="110" r="95" fill="none" stroke="var(--bg-secondary)" strokeWidth="3"/>
            <circle
              cx="110" cy="110" r="95"
              fill="none"
              stroke="var(--accent)"
              strokeWidth="3"
              strokeDasharray={`${2 * Math.PI * 95}`}
              strokeDashoffset={`${2 * Math.PI * 95 * (1 - progress / 100)}`}
              className="timer-ring"
              strokeLinecap="round"
            />
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <div className="font-display text-6xl tabular-nums">
              {String(mins).padStart(2, '0')}:{String(secs).padStart(2, '0')}
            </div>
            <div className="text-xs font-mono opacity-60 mt-2">
              {t('pomo.sessions')} {sessions} · {mode === 'work' ? t('pomo.workMsg') : t('pomo.breakMsg')}
            </div>
          </div>
          <div className="absolute -bottom-2 -right-2" style={{ animation: isRunning ? 'catBob 2s infinite' : 'none' }}>
            <Cat mood={isRunning ? 'working' : 'idle'} size={60}/>
          </div>
        </div>
      </div>

      <div className="flex gap-2">
        <button
          onClick={() => setIsRunning(!isRunning)}
          className="flex-1 paper-sm btn-press py-3 font-mono text-sm flex items-center justify-center gap-2"
          style={{ background: 'var(--accent)', color: 'var(--paper)', borderColor: 'var(--line)' }}
        >
          <Icon name={isRunning ? 'pause' : 'play'} size={16}/>
          {isRunning ? t('pomo.pause') : t('pomo.start')}
        </button>
        <button
          onClick={() => { setIsRunning(false); setSecondsLeft(workDuration * 60); setMode('work'); }}
          className="paper-sm btn-press py-3 px-4"
        >
          <Icon name="reset" size={16}/>
        </button>
      </div>
    </div>
  );
};

const TaskManager = ({ userId, tasks, setTasks, messy, lang }) => {
  const t = useT(lang);
  const [input, setInput] = useState('');
  const [filter, setFilter] = useState('today');
  const [view, setView] = useState('list');

  const addTask = () => {
    if (!input.trim()) return;
    const today = new Date().toISOString().split('T')[0];
    setTasks([...tasks, {
      id: Date.now(),
      text: input.trim(),
      done: false,
      date: today,
      created: Date.now(),
      tags: [],
    }]);
    setInput('');
  };

  const toggleTask = (id) => {
    setTasks(tasks.map(tk => tk.id === id ? { ...tk, done: !tk.done } : tk));
  };

  const removeTask = (id) => {
    setTasks(tasks.filter(tk => tk.id !== id));
  };

  const filteredTasks = useMemo(() => {
    const today = new Date().toISOString().split('T')[0];
    if (filter === 'today') return tasks.filter(tk => tk.date === today);
    if (filter === 'upcoming') return tasks.filter(tk => tk.date > today);
    return tasks;
  }, [tasks, filter]);

  return (
    <div className="paper p-6" style={getMessyStyle(messy, 3)}>
      <div className="flex items-center justify-between mb-4">
        <div>
          <div className="text-xs font-mono opacity-60">{t('tasks.label')}</div>
          <div className="font-display text-2xl">{t('tasks.title')}</div>
        </div>
        <div className="flex gap-1">
          <button onClick={() => setView('list')} className={`p-2 paper-sm btn-press ${view === 'list' ? '' : 'opacity-50'}`}>
            <Icon name="list" size={14}/>
          </button>
          <button onClick={() => setView('calendar')} className={`p-2 paper-sm btn-press ${view === 'calendar' ? '' : 'opacity-50'}`}>
            <Icon name="cal" size={14}/>
          </button>
        </div>
      </div>

      <div className="flex gap-2 mb-4">
        <input
          type="text"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && addTask()}
          placeholder={t('tasks.placeholder')}
          className="flex-1 paper-sm px-3 py-2 text-sm bg-transparent outline-none"
          style={{ background: 'var(--paper)' }}
        />
        <button onClick={addTask} className="paper-sm btn-press px-4" style={{ background: 'var(--accent)', color: 'var(--paper)' }}>
          <Icon name="plus" size={16}/>
        </button>
      </div>

      <div className="flex gap-1 mb-3 text-xs font-mono">
        {['today', 'upcoming', 'all'].map(f => (
          <button
            key={f}
            onClick={() => setFilter(f)}
            className={`px-3 py-1 paper-sm btn-press ${filter === f ? '' : 'opacity-50'}`}
            style={{ background: filter === f ? 'var(--fg)' : 'var(--paper)', color: filter === f ? 'var(--paper)' : 'var(--fg)' }}
          >
            {t(`tasks.${f}`)}
          </button>
        ))}
      </div>

      {view === 'list' ? (
        <div className="space-y-2 max-h-80 overflow-y-auto hide-scrollbar">
          {filteredTasks.length === 0 && (
            <div className="text-center py-8 opacity-50 text-sm font-mono">
              {t('tasks.empty')}
            </div>
          )}
          {filteredTasks.map((tk, i) => (
            <div
              key={tk.id}
              className="paper-sm p-3 flex items-center gap-3 group"
              style={{ background: 'var(--paper)', ...getMessyStyle(messy - 1, i + 1) }}
            >
              <div className={`custom-check ${tk.done ? 'checked' : ''}`} onClick={() => toggleTask(tk.id)}>
                {tk.done && <Icon name="check" size={14} className="text-white"/>}
              </div>
              <div className={`flex-1 text-sm ${tk.done ? 'line-through opacity-50' : ''}`}>{tk.text}</div>
              <button onClick={() => removeTask(tk.id)} className="opacity-0 group-hover:opacity-60 transition-opacity">
                <Icon name="x" size={14}/>
              </button>
            </div>
          ))}
        </div>
      ) : (
        <CalendarView tasks={tasks}/>
      )}
    </div>
  );
};

const CalendarView = ({ tasks }) => {
  const [month, setMonth] = useState(new Date().getMonth());
  const [year, setYear] = useState(new Date().getFullYear());
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const monthName = new Date(year, month).toLocaleString('en', { month: 'long' });
  const tasksByDate = useMemo(() => {
    const map = {};
    tasks.forEach(tk => {
      if (!map[tk.date]) map[tk.date] = [];
      map[tk.date].push(tk);
    });
    return map;
  }, [tasks]);

  return (
    <div>
      <div className="flex items-center justify-between mb-3 text-sm font-mono">
        <button onClick={() => { if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1); }} className="paper-sm btn-press px-2">‹</button>
        <span>{monthName} {year}</span>
        <button onClick={() => { if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1); }} className="paper-sm btn-press px-2">›</button>
      </div>
      <div className="grid grid-cols-7 gap-1 text-xs font-mono opacity-50 mb-1">
        {['s','m','t','w','t','f','s'].map((d, i) => <div key={i} className="text-center">{d}</div>)}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {Array.from({ length: firstDay }).map((_, i) => <div key={'e' + i}/>)}
        {Array.from({ length: daysInMonth }).map((_, i) => {
          const day = i + 1;
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const hasTasks = tasksByDate[dateStr];
          const isToday = dateStr === new Date().toISOString().split('T')[0];
          return (
            <div key={day} className="paper-sm aspect-square p-1 text-xs font-mono flex flex-col" style={{ background: isToday ? 'var(--accent)' : 'var(--paper)', color: isToday ? 'var(--paper)' : 'var(--fg)' }}>
              <div>{day}</div>
              {hasTasks && <div className="text-[10px] mt-auto">{hasTasks.length}•</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
};

const RandomWheel = ({ tasks, messy, lang }) => {
  const t = useT(lang);
  const [spinning, setSpinning] = useState(false);
  const [selected, setSelected] = useState(null);
  const [rotation, setRotation] = useState(0);
  const todayTasks = useMemo(() => {
    const today = new Date().toISOString().split('T')[0];
    return tasks.filter(tk => !tk.done && tk.date === today).slice(0, 8);
  }, [tasks]);

  const spin = () => {
    if (todayTasks.length === 0 || spinning) return;
    setSpinning(true);
    setSelected(null);
    const newRotation = rotation + 1440 + Math.random() * 720;
    setRotation(newRotation);
    setTimeout(() => {
      const pickIdx = Math.floor(Math.random() * todayTasks.length);
      setSelected(todayTasks[pickIdx]);
      setSpinning(false);
    }, 2500);
  };

  return (
    <div className="paper p-6" style={getMessyStyle(messy, 4)}>
      <div className="mb-4">
        <div className="text-xs font-mono opacity-60">{t('wheel.label')}</div>
        <div className="font-display text-2xl">{t('wheel.title')}</div>
      </div>

      <div className="relative w-full aspect-square max-w-[280px] mx-auto">
        {todayTasks.length > 0 ? (
          <>
            <div className="absolute inset-0 transition-transform duration-[2500ms]" style={{ transform: `rotate(${rotation}deg)`, transitionTimingFunction: 'cubic-bezier(0.16, 1, 0.3, 1)' }}>
              {todayTasks.map((tk, i) => {
                const angle = (i / todayTasks.length) * 2 * Math.PI - Math.PI / 2;
                const x = Math.cos(angle) * 95 + 50;
                const y = Math.sin(angle) * 95 + 50;
                return (
                  <div key={tk.id} className="absolute paper-sm px-2 py-1 text-[10px] max-w-[100px] truncate" style={{ left: `${x}%`, top: `${y}%`, transform: 'translate(-50%, -50%)', background: 'var(--paper)' }}>
                    {tk.text}
                  </div>
                );
              })}
            </div>
            <button onClick={spin} disabled={spinning} className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 paper btn-press p-6 flex items-center justify-center hover:scale-105 transition-transform disabled:opacity-50" style={{ background: 'var(--accent)', color: 'var(--paper)', borderRadius: '50%', width: 100, height: 100 }}>
              <div className="text-center">
                <Icon name="folder" size={24}/>
                <div className="text-[10px] font-mono mt-1">{spinning ? '...' : 'SPIN'}</div>
              </div>
            </button>
          </>
        ) : (
          <div className="absolute inset-0 flex items-center justify-center opacity-50 text-sm font-mono text-center whitespace-pre-line">
            {t('wheel.empty')}
          </div>
        )}
      </div>

      {selected && !spinning && (
        <div className="mt-4 paper-sm p-3 text-center fade-in" style={{ background: 'var(--accent-soft)' }}>
          <div className="text-xs font-mono opacity-70">{t('wheel.pick')}</div>
          <div className="text-sm mt-1">{selected.text}</div>
        </div>
      )}
    </div>
  );
};

const Statistics = ({ userId, tasks, sessions, messy, lang }) => {
  const t = useT(lang);
  const [range, setRange] = useUserStorage(userId, 'stat_range', 'week');

  const stats = useMemo(() => {
    const now = new Date();
    const cutoff = new Date();
    if (range === 'day') cutoff.setHours(0,0,0,0);
    else if (range === 'week') cutoff.setDate(now.getDate() - 7);
    else if (range === 'month') cutoff.setMonth(now.getMonth() - 1);
    else cutoff.setFullYear(now.getFullYear() - 1);

    const completed = tasks.filter(tk => tk.done && tk.created >= cutoff.getTime()).length;
    const total = tasks.filter(tk => tk.created >= cutoff.getTime()).length;
    const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

    const days = range === 'day' ? 1 : range === 'week' ? 7 : range === 'month' ? 30 : 12;
    const bars = Array.from({ length: days }).map((_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (days - 1 - i));
      const dateStr = d.toISOString().split('T')[0];
      const count = tasks.filter(tk => tk.done && tk.date === dateStr).length;
      return { label: range === 'month' ? d.getDate() : d.toLocaleDateString('en', { weekday: 'short' }).slice(0, 2), count };
    });

    return { completed, total, rate, bars };
  }, [tasks, range]);

  const maxBar = Math.max(1, ...stats.bars.map(b => b.count));

  return (
    <div className="paper p-6" style={getMessyStyle(messy, 3)}>
      <div className="flex items-center justify-between mb-4">
        <div>
          <div className="text-xs font-mono opacity-60">{t('stats.label')}</div>
          <div className="font-display text-2xl">{t('stats.title')}</div>
        </div>
        <div className="flex gap-1">
          {['day','week','month','year'].map(r => (
            <button key={r} onClick={() => setRange(r)} className="paper-sm btn-press px-2 py-1 text-[10px] font-mono" style={{ background: range === r ? 'var(--fg)' : 'var(--paper)', color: range === r ? 'var(--paper)' : 'var(--fg)' }}>
              {t(`stats.${r}`)}
            </button>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-3 gap-2 mb-4">
        <div className="paper-sm p-3 text-center">
          <div className="text-2xl font-display">{stats.completed}</div>
          <div className="text-[10px] font-mono opacity-60">{t('stats.done')}</div>
        </div>
        <div className="paper-sm p-3 text-center">
          <div className="text-2xl font-display">{sessions}</div>
          <div className="text-[10px] font-mono opacity-60">{t('stats.pomos')}</div>
        </div>
        <div className="paper-sm p-3 text-center">
          <div className="text-2xl font-display">{stats.rate}%</div>
          <div className="text-[10px] font-mono opacity-60">{t('stats.rate')}</div>
        </div>
      </div>

      <div className="paper-sm p-3" style={{ background: 'var(--paper)' }}>
        <div className="flex items-end gap-1 h-32">
          {stats.bars.map((b, i) => (
            <div key={i} className="flex-1 flex flex-col items-center gap-1">
              <div className="w-full" style={{ height: `${(b.count / maxBar) * 100}%`, background: 'var(--accent)', minHeight: b.count > 0 ? '4px' : '0', transition: 'height 0.5s' }}/>
              <div className="text-[8px] font-mono opacity-50">{b.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const AIChat = ({ userId, apiKey, model, tasks, sessions, moods, messy, lang, onSetupKey }) => {
  const t = useT(lang);
  const [messages, setMessages] = useUserStorage(userId, 'chat_msgs', [
    { role: 'cat', text: t('chat.greet') },
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    scrollRef.current?.scrollTo(0, scrollRef.current.scrollHeight);
  }, [messages]);

  const quickPrompts = [
    t('chat.prompts.summary'),
    t('chat.prompts.reflect'),
    t('chat.prompts.today'),
    t('chat.prompts.patterns'),
  ];

  const sendMessage = async (textOverride) => {
    const text = textOverride || input.trim();
    if (!text || loading) return;
    setInput('');
    setMessages(prev => [...prev, { role: 'user', text }]);
    setLoading(true);

    if (!apiKey) {
      setMessages(prev => [...prev, { role: 'cat', text: lang === 'vi' ? 'mèo cần API key để chat ~ click nút bên dưới để setup nhé 🐾' : 'i need an API key to chat ~ click below to set it up 🐾', needSetup: true }]);
      setLoading(false);
      return;
    }

    try {
      const context = `User context:
- Today tasks: ${tasks.filter(tk => tk.date === new Date().toISOString().split('T')[0]).map(tk => `${tk.done ? '✓' : '○'} ${tk.text}`).join(', ') || 'none'}
- Pomodoro sessions today: ${sessions}
- Recent moods: ${(moods || []).slice(0, 3).map(m => m.mood).join(', ') || 'none'}
- Total tasks: ${tasks.length}, completed: ${tasks.filter(tk => tk.done).length}

You are Mochi, a friendly cat assistant for an ADHD-focused productivity app. Reply in ${lang === 'vi' ? 'Vietnamese' : 'English'}, casual genZ tone, short messages (2-4 sentences max), use cat emojis sparingly. Be supportive, gentle, validate emotions. User said: "${text}"`;

      const modelName = model || 'gemini-2.5-flash';
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] }),
      });
      const data = await res.json();
      if (data.error) {
        setMessages(prev => [...prev, { role: 'cat', text: `meow 😿 ${data.error.message}` }]);
      } else {
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'meow? empty response 😿';
        setMessages(prev => [...prev, { role: 'cat', text: reply }]);
      }
    } catch (err) {
      setMessages(prev => [...prev, { role: 'cat', text: `🐾 network error: ${err.message}` }]);
    }
    setLoading(false);
  };

  return (
    <div className="paper p-6 flex flex-col" style={{ height: 500, ...getMessyStyle(messy, 1) }}>
      <div className="flex items-center justify-between mb-4">
        <div>
          <div className="text-xs font-mono opacity-60">{t('chat.label')}</div>
          <div className="font-display text-2xl flex items-center gap-2">
            {t('chat.title')}
            <Cat mood="idle" size={32}/>
          </div>
        </div>
      </div>

      <div ref={scrollRef} className="flex-1 overflow-y-auto hide-scrollbar space-y-3 mb-3">
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
            <div className="paper-sm px-3 py-2 text-sm max-w-[80%]" style={{ background: m.role === 'user' ? 'var(--fg)' : 'var(--paper)', color: m.role === 'user' ? 'var(--paper)' : 'var(--fg)' }}>
              {m.text}
              {m.needSetup && (
                <button onClick={onSetupKey} className="block mt-2 paper-sm btn-press px-2 py-1 text-xs font-mono" style={{ background: 'var(--accent)', color: 'var(--paper)' }}>
                  🔑 setup API key
                </button>
              )}
            </div>
          </div>
        ))}
        {loading && (
          <div className="flex justify-start">
            <div className="paper-sm px-3 py-2 text-sm">
              <span className="inline-flex gap-1">
                <span className="animate-bounce">•</span>
                <span className="animate-bounce" style={{ animationDelay: '0.1s' }}>•</span>
                <span className="animate-bounce" style={{ animationDelay: '0.2s' }}>•</span>
              </span>
            </div>
          </div>
        )}
      </div>

      <div className="flex flex-wrap gap-1 mb-2">
        {quickPrompts.map(p => (
          <button key={p} onClick={() => sendMessage(p)} className="paper-sm btn-press px-2 py-1 text-[10px] font-mono opacity-70 hover:opacity-100">
            {p}
          </button>
        ))}
      </div>

      <div className="flex gap-2">
        <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} placeholder={t('chat.placeholder')} className="flex-1 paper-sm px-3 py-2 text-sm bg-transparent outline-none" style={{ background: 'var(--paper)' }}/>
        <button onClick={() => sendMessage()} className="paper-sm btn-press px-4" style={{ background: 'var(--accent)', color: 'var(--paper)' }}>
          <Icon name="send" size={16}/>
        </button>
      </div>
    </div>
  );
};

const ClueBoard = ({ tasks, moods, sessions, apiKey, model, messy, lang }) => {

    if (!apiKey) { setReport(lang === 'vi' ? 'cần API key ~ vào Settings nhé' : 'API key needed ~ check Settings'); return; }
    setLoading(true);
    try {
      const prompt = `Generate a brief insight report for this ADHD user in ${lang === 'vi' ? 'Vietnamese' : 'English'}, genZ tone:
- Tasks: ${tasks.length} total, ${tasks.filter(tk => tk.done).length} done
- Today done: ${tasks.filter(tk => tk.done && tk.date === new Date().toISOString().split('T')[0]).length}

- Mood entries: ${moods?.length || 0}

Give 3 short insights and 1 actionable suggestion. Max 150 words. Be warm, never preachy.`;

      const modelName = model || 'gemini-2.5-flash';

        method: 'POST',
        headers: { 'Content-Type': 'application/json' },

      ) : (

              <line key={`${i}-${j}`} x1={`${it.x + 5}%`} y1={`${it.y + 5}%`} x2={`${it2.x + 5}%`} y2={`${it2.y + 5}%`} stroke="var(--accent)" strokeWidth="1" strokeDasharray="2,2" opacity="0.4"/>

const StickerBoard = ({ userId, messy, lang }) => {
  const t = useT(lang);
  const [stickers, setStickers] = useUserStorage(userId, 'stickers', []);
  const [draggingId, setDraggingId] = useState(null);

  const addSticker = (emoji) => {
    setStickers([...stickers, {
      id: Date.now(), emoji,
      x: 20 + Math.random() * 60, y: 20 + Math.random() * 60,
      rot: -15 + Math.random() * 30,
    }]);
  };
  const updatePosition = (id, x, y) => {
    setStickers(stickers.map(s => s.id === id ? { ...s, x, y } : s));
  };
  const removeSticker = (id) => setStickers(stickers.filter(s => s.id !== id));

  return (
    <div className="paper p-6" style={getMessyStyle(messy, 4)}>
      <div className="mb-4">
        <div className="text-xs font-mono opacity-60">{t('sticker.label')}</div>
        <div className="font-display text-2xl">{t('sticker.title')}</div>
      </div>
      <div className="flex gap-1 mb-3 flex-wrap">
        {['🌸','⭐','🐾','💀','🔥','💖','🌈','🍓','🧚','🐱','✨','🍃','☕','📚','🎧','🌙'].map(e => (
          <button key={e} onClick={() => addSticker(e)} className="paper-sm btn-press w-9 h-9 text-lg hover:scale-110 transition-transform">
            {e}
          </button>
        ))}
      </div>
      <div
        className="relative paper-sm h-64 overflow-hidden"
        style={{ background: 'var(--paper)' }}
        onDragOver={e => e.preventDefault()}
        onDrop={e => {
          e.preventDefault();
          if (draggingId === null) return;
          const rect = e.currentTarget.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          updatePosition(draggingId, x, y);
          setDraggingId(null);
        }}
      >
        {stickers.length === 0 && (
          <div className="absolute inset-0 flex items-center justify-center text-xs font-mono opacity-50 text-center whitespace-pre-line">
            {t('sticker.empty')}
          </div>
        )}
        {stickers.map(s => (
          <div
            key={s.id}
            draggable
            onDragStart={() => setDraggingId(s.id)}
            onDoubleClick={() => removeSticker(s.id)}
            className="absolute text-3xl cursor-grab hover:scale-110 transition-transform select-none"
            style={{ left: `${s.x}%`, top: `${s.y}%`, transform: `translate(-50%, -50%) rotate(${s.rot}deg)` }}
          >
            {s.emoji}
          </div>
        ))}
      </div>
    </div>
  );
};

        <button onClick={() => { play(); setOverlayPage('privacy'); onClose(); }} className="w-full paper-sm btn-press py-2 text-xs font-mono text-left px-3">
          📄 {t('account.privacy')}
        </button>
        <button onClick={() => { play(); setOverlayPage('terms'); onClose(); }} className="w-full paper-sm btn-press py-2 text-xs font-mono text-left px-3">
          📜 {t('account.terms')}
        </button>
      </div>

      {/* export / import */}
      {user && (
        <div className="pt-2 border-t" style={{ borderColor: 'var(--bg-secondary)' }}>
          <div className="text-xs font-mono opacity-60 mb-2">{lang === 'vi' ? 'backup dữ liệu' : 'data backup'}</div>
          <div className="flex gap-2">
            <button onClick={() => { play(); exportData(); }} className="flex-1 paper-sm btn-press py-2 text-xs font-mono flex items-center justify-center gap-1">
              <Icon name="download" size={12}/> export
            </button>
            <button onClick={() => { play(); fileInputRef.current?.click(); }} className="flex-1 paper-sm btn-press py-2 text-xs font-mono flex items-center justify-center gap-1">
              <Icon name="upload" size={12}/> import
            </button>
            <input ref={fileInputRef} type="file" accept=".json" onChange={importData} className="hidden"/>
          </div>
        </div>
      )}
    </div>
  );

  const renderAppearance = () => (
    <div className="space-y-4">
      {/* sound */}
      <div>
        <div className="text-xs font-mono opacity-60 mb-2">{t('appearance.sound')}</div>
        <button
          onClick={() => { setSoundEnabled(!soundEnabled); playClick(true); }}
          className="w-full paper-sm btn-press py-3 text-xs font-mono flex items-center justify-center gap-2"
          style={{ background: soundEnabled ? 'var(--accent)' : 'var(--paper)', color: soundEnabled ? 'var(--paper)' : 'var(--fg)' }}
        >
          🔊 {soundEnabled ? t('appearance.soundOn') : t('appearance.soundOff')}
        </button>
      </div>

      {/* mess level slider */}
      <div>
        <div className="text-xs font-mono opacity-60 mb-1">{t('appearance.messy')}</div>
        <div className="paper-sm p-4">
          <div className="flex justify-between text-xs font-mono mb-2 items-center">
            <span className="opacity-60">{lang === 'vi' ? 'gọn gàng' : 'clean'}</span>
            <span className="font-bold text-[var(--accent)]">{getMessyLabel(messy, lang)} ({messy}/5)</span>
            <span className="opacity-60">{lang === 'vi' ? 'hỗn loạn' : 'chaos'}</span>
          </div>
          <input
            type="range"
            min="1"
            max="5"
            value={messy}
            onChange={e => { setMessyOverride(+e.target.value); }}
            className="w-full"
          />
          <div className="flex justify-between text-[10px] font-mono opacity-50 mt-1">
            <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
          </div>
        </div>
        <div className="text-[10px] font-mono opacity-50 mt-1">{t('appearance.messyHelp')}</div>
        {messyOverride !== null && messyOverride !== (adhdProfile?.messy || 1) && (
          <button onClick={() => { play(); setMessyOverride(null); }} className="text-[10px] font-mono opacity-70 underline mt-1">
            {lang === 'vi' ? '↻ reset về quiz' : '↻ reset to quiz'}
          </button>
        )}
      </div>

      {/* cat toggle */}
      <div>
        <div className="text-xs font-mono opacity-60 mb-1">{t('settings.cat')}</div>
        <button onClick={() => { play(); setShowCat(!showCat); }} className="w-full paper-sm btn-press py-2 text-xs font-mono" style={{ background: showCat ? 'var(--accent)' : 'var(--paper)', color: showCat ? 'var(--paper)' : 'var(--fg)' }}>
          🐾 {showCat ? t('settings.catOn') : t('settings.catOff')}
        </button>
      </div>

      {/* api key */}
      <div className="pt-3 border-t" style={{ borderColor: 'var(--bg-secondary)' }}>
        <div className="text-xs font-mono opacity-60 mb-1">{t('settings.api')}</div>
        <div className="paper-sm p-2 text-xs font-mono break-all opacity-70 mb-2">
          {apiKey ? `••••${apiKey.slice(-8)}` : 'not set'}
        </div>
        <button onClick={() => { play(); setShowWizard(true); onClose(); }} className="w-full paper-sm btn-press py-2 text-xs font-mono" style={{ background: 'var(--accent)', color: 'var(--paper)' }}>
          🔑 {apiKey ? 'change' : 'setup'} key
        </button>
        {apiKey && (
          <div className="mt-2">
            <div className="text-[10px] font-mono opacity-60 mb-1">{t('settings.model')}</div>
            <select value={model} onChange={e => setModel(e.target.value)} className="w-full paper-sm px-3 py-2 text-xs bg-transparent outline-none font-mono" style={{ background: 'var(--paper)' }}>
              <option value="gemini-2.5-flash">gemini-2.5-flash</option>
              <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
              <option value="gemini-2.5-pro">gemini-2.5-pro</option>
              <option value="gemini-3-flash">gemini-3-flash</option>
              <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
            </select>
          </div>
        )}
      </div>

      {/* ADHD retake */}
      <div className="pt-3 border-t" style={{ borderColor: 'var(--bg-secondary)' }}>
        <div className="text-xs font-mono opacity-60 mb-1">{t('settings.adhd')}</div>
        <div className="paper-sm p-3 flex items-center justify-between">
          <div>
            <div className="font-display text-xl">{adhdProfile?.score || 0}/10</div>
            <div className="text-[10px] font-mono opacity-60">{t('settings.adhdLayout')}: {messy >= 4 ? 'chaos' : messy >= 3 ? 'casual mess' : 'tidy'}</div>
          </div>
          <button onClick={() => { play(); setAdhdProfile(null); onClose(); }} className="paper-sm btn-press px-3 py-1 text-xs font-mono">
            {t('settings.retake')}
          </button>
        </div>
      </div>
    </div>
  );

  const renderSubscription = () => (
    <div className="space-y-4">
      {/* current plan card */}
      <div className="paper-sm p-5 text-center" style={{ background: plan === 'starter' ? 'var(--paper)' : 'var(--accent-soft)' }}>
        <div className="text-5xl mb-2">{planInfo.emoji}</div>
        <div className="text-xs font-mono opacity-60 uppercase mb-1">{t('sub.current')}</div>
        <div className="font-display text-3xl mb-1">{planInfo.name}</div>
        <div className="text-sm opacity-70">{planInfo.price}{plan !== 'starter' ? `/${t('common.month')}` : ''}</div>
      </div>

      {/* upgrade button */}
      <button
        onClick={() => { play('success'); setShowUpgrade(true); onClose(); }}
        className="w-full paper-sm btn-press py-3 text-sm font-mono shine-btn"
        style={{ background: 'var(--accent)', color: 'var(--paper)' }}
      >
        {plan === 'royal' ? (lang === 'vi' ? '✓ gói cao nhất rồi' : '✓ already at top tier') : t('sub.upgrade')}
      </button>

      {/* support */}
      <div className="pt-3 border-t space-y-2" style={{ borderColor: 'var(--bg-secondary)' }}>
        <button onClick={() => { play(); setOverlayPage('troubleshoot'); onClose(); }} className="w-full paper-sm btn-press py-2 text-xs font-mono flex items-center justify-between px-3">
          <span className="flex items-center gap-2">🔧 {t('sub.troubleshoot')}</span>
          <span className="opacity-50">›</span>
        </button>
        <a
          href="mailto:chilllikesnowy@gmail.com?subject=Subscription%20Issue%20Report&body=Hi%20brain.exe%20team%2C%0A%0AI%20am%20experiencing%20the%20following%20subscription%20issue%3A%0A%0A%5BDescribe%20your%20issue%20here%5D%0A%0AThank%20you%21"
          onClick={() => play()}
          className="w-full paper-sm btn-press py-2 text-xs font-mono flex items-center justify-between px-3"
        >
          <span className="flex items-center gap-2">📧 {t('sub.report')}</span>
          <span className="opacity-50">↗</span>
        </a>
      </div>
    </div>
  );

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: 'rgba(0,0,0,0.5)' }} onClick={onClose}>
      <div className="paper w-full sm:max-w-md fade-in max-h-[92vh] overflow-y-auto hide-scrollbar" style={{ borderRadius: '24px 24px 0 0' }} onClick={e => e.stopPropagation()}>
        {/* header */}
        <div className="sticky top-0 z-10 px-5 pt-5 pb-3 border-b backdrop-blur-md" style={{ background: 'rgba(255,255,255,0.9)', borderColor: 'var(--bg-secondary)' }}>
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-2 flex-1 min-w-0">
              {section !== 'main' && (
                <button onClick={() => { play(); setSection('main'); }} className="paper-sm btn-press px-2 py-1 text-xs font-mono">←</button>
              )}
              <div className="font-display text-xl truncate">
                {section === 'main' && (user ? `${user.name}${lang === 'vi' ? "'s space" : "'s Space"}` : t('settings.title'))}
                {section === 'account' && t('space.myAccount').toLowerCase()}
                {section === 'appearance' && t('appearance.title')}
                {section === 'subscription' && t('sub.title')}
              </div>
            </div>
            <button onClick={onClose} className="paper-sm btn-press p-2">
              <Icon name="x" size={14}/>
            </button>
          </div>
        </div>

        {/* body */}
        <div className="p-5">
          {section === 'main' && renderMain()}
          {section === 'account' && renderAccount()}
          {section === 'appearance' && renderAppearance()}
          {section === 'subscription' && renderSubscription()}
        </div>
      </div>
    </div>
  );
};

/* =================================================================
   DASHBOARD (logged in app)
================================================================= */
const Dashboard = ({ user: initialUser, lang, setLang, theme, setTheme, onLogout, onUserUpdate }) => {
  const t = useT(lang);
  const [user, setUser] = useState(initialUser);
  const userId = user?.userId || null;
  const [adhdProfile, setAdhdProfile] = useUserStorage(userId, 'adhd_profile', null);
  const [tasks, setTasks] = useUserStorage(userId, 'tasks', []);
  const [moods] = useUserStorage(userId, 'moods', []);
  const [sessions] = useUserStorage(userId, 'sessions', 0);
  const [apiKey, setApiKey] = useUserStorage(userId, 'api_key', '');
  const [model, setModel] = useUserStorage(userId, 'ai_model', 'gemini-2.5-flash');
  const [soundEnabled, setSoundEnabled] = useUserStorage(userId, 'sound_enabled', true);
  const [messyOverride, setMessyOverride] = useUserStorage(userId, 'messy_override', null);
  const [plan, setPlan] = useUserStorage(userId, 'plan', 'starter');
  const [showSettings, setShowSettings] = useState(false);
  const [showWizard, setShowWizard] = useState(false);
  const [showUpgrade, setShowUpgrade] = useState(false);
  const [overlayPage, setOverlayPage] = useState(null); // 'privacy' | 'terms' | 'troubleshoot' | null
  const [tab, setTab] = useState('home');
  const [showCat, setShowCat] = useUserStorage(userId, 'show_cat', true);
  const [catMessage, setCatMessage] = useState('');
  const fileInputRef = useRef(null);

  const completedCount = tasks.filter(tk => tk.done).length;
  const baseMessy = adhdProfile?.messy || 1;
  const messy = messyOverride !== null ? messyOverride : baseMessy;

  const soundCtx = useMemo(() => ({
    enabled: soundEnabled,
    play: (type) => playClick(soundEnabled, type),
  }), [soundEnabled]);

  useEffect(() => {
    if (adhdProfile) {
      const hour = new Date().getHours();
      setCatMessage(hour < 12 ? t('app.morning') : hour < 18 ? t('app.afternoon') : t('app.evening'));
    }
  }, [adhdProfile, lang]);

  // show wizard on first login if no API key
  useEffect(() => {
    if (adhdProfile && !apiKey && user) {
      const store = getStore();
      const seenKey = `${userId}::wizard_seen`;
      if (!store[seenKey]) {
        setShowWizard(true);
        store[seenKey] = true;
        saveStore(store);
      }
    }
  }, [adhdProfile, apiKey, user, userId]);

  const exportData = () => {
    const store = getStore();
    const userKeys = Object.keys(store).filter(k => k.startsWith(`${userId}::`));
    const userData = {};
    userKeys.forEach(k => { userData[k] = store[k]; });
    const blob = new Blob([JSON.stringify({ user, data: userData, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `brain-exe-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.data) return alert('invalid backup file');
        const store = getStore();
        Object.keys(parsed.data).forEach(k => {
          const newKey = k.replace(/^[^:]+::/, `${userId}::`);
          store[newKey] = parsed.data[k];
        });
        saveStore(store);
        alert('imported! refresh the page');
        window.location.reload();
      } catch (err) {
        alert('error reading file');
      }
    };
    reader.readAsText(file);
  };

  if (!adhdProfile) {
    return <Questionnaire onComplete={setAdhdProfile} lang={lang}/>;
  }

  const tabs = [
    { id: 'home', label: t('app.tab.home'), icon: 'home' },
    { id: 'tasks', label: t('app.tab.tasks'), icon: 'list' },
    { id: 'timer', label: t('app.tab.timer'), icon: 'timer' },
    { id: 'chat', label: t('app.tab.chat'), icon: 'chat' },
    { id: 'stats', label: t('app.tab.stats'), icon: 'chart' },
  ];

  return (
    <SoundContext.Provider value={soundCtx}>
    <div className="min-h-screen pb-24">
      <header className="sticky top-0 z-30 backdrop-blur-md" style={{ background: 'rgba(244, 241, 236, 0.7)' }}>
        <div className="border-b" style={{ borderColor: 'var(--line)' }}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <Cat mood="idle" size={36}/>
              <div>
                <div className="font-display text-xl leading-none">brain.exe</div>
                <div className="text-[10px] font-mono opacity-50">
                  adhd {adhdProfile?.score || 0}/10 · {getMessyLabel(messy, lang)}
                </div>
              </div>
            </div>
            <div className="flex items-center gap-1 sm:gap-2">
              <button onClick={() => { soundCtx.play(); setTheme(theme === 'light' ? 'dark' : 'light'); }} className="paper-sm btn-press p-2">
                <Icon name={theme === 'light' ? 'moon' : 'sun'} size={14}/>
              </button>
              <button
                onClick={() => { soundCtx.play(); setShowSettings(true); }}
                className="paper-sm btn-press px-3 py-2 text-xs font-mono flex items-center gap-2 max-w-[180px] truncate"
                title={`${user?.name || 'guest'}'s Space`}
              >
                <Icon name="user" size={14}/>
                <span className="truncate">{user?.name || 'guest'}{lang === 'vi' ? "'s space" : "'s space"}</span>
              </button>
            </div>
          </div>
        </div>
        <div className="border-b overflow-hidden py-1.5" style={{ borderColor: 'var(--line)', background: 'var(--accent)' }}>
          <div className="marquee whitespace-nowrap text-[11px] font-mono" style={{ color: 'var(--paper)' }}>
            {Array(2).fill(null).map((_, k) => (
              <span key={k}>
                ★ pomodoro for chaotic brains ★ powered by mochi ★ stay weird ★ one task at a time ★ you are doing great ★ &nbsp;
              </span>
            ))}
          </div>
        </div>
      </header>

      <div className="hidden lg:flex max-w-7xl mx-auto px-6 mt-4 gap-1">
        {tabs.map(tb => (
          <button key={tb.id} onClick={() => setTab(tb.id)} className="paper-sm btn-press px-4 py-2 text-sm font-mono flex items-center gap-2" style={{ background: tab === tb.id ? 'var(--fg)' : 'var(--paper)', color: tab === tb.id ? 'var(--paper)' : 'var(--fg)' }}>
            <Icon name={tb.icon} size={14}/>
            {tb.label}
          </button>
        ))}
      </div>

      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-4 page-enter" key={tab}>
        {tab === 'home' && (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="lg:col-span-2 space-y-4">
              <PomodoroTimer userId={userId} messy={messy} lang={lang}/>
              <TaskManager userId={userId} tasks={tasks} setTasks={setTasks} messy={messy} lang={lang}/>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <MoodDiary userId={userId} messy={messy} lang={lang}/>
                <RandomWheel tasks={tasks} messy={messy} lang={lang}/>
              </div>
            </div>
            <div className="space-y-4">
              <GardenGame completedTasks={completedCount} messy={messy} lang={lang}/>
              <StickerBoard userId={userId} messy={messy} lang={lang}/>
              <ClueBoard tasks={tasks} moods={moods} sessions={sessions} apiKey={apiKey} model={model} messy={messy} lang={lang}/>
            </div>
          </div>
        )}
        {tab === 'tasks' && (
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <TaskManager userId={userId} tasks={tasks} setTasks={setTasks} messy={messy} lang={lang}/>
            <RandomWheel tasks={tasks} messy={messy} lang={lang}/>
          </div>
        )}
        {tab === 'timer' && (
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <PomodoroTimer userId={userId} messy={messy} lang={lang}/>
            <GardenGame completedTasks={completedCount} messy={messy} lang={lang}/>
          </div>
        )}
        {tab === 'chat' && (
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <AIChat userId={userId} apiKey={apiKey} model={model} tasks={tasks} sessions={sessions} moods={moods} messy={messy} lang={lang} onSetupKey={() => setShowWizard(true)}/>
            <div className="space-y-4">
              <ClueBoard tasks={tasks} moods={moods} sessions={sessions} apiKey={apiKey} model={model} messy={messy} lang={lang}/>
              <MoodDiary userId={userId} messy={messy} lang={lang}/>
            </div>
          </div>
        )}
        {tab === 'stats' && (
          <div className="max-w-2xl mx-auto">
            <Statistics userId={userId} tasks={tasks} sessions={sessions} messy={messy} lang={lang}/>
          </div>
        )}
      </main>

      <nav className="lg:hidden fixed bottom-0 left-0 right-0 z-30 border-t backdrop-blur-md" style={{ background: 'rgba(244, 241, 236, 0.9)', borderColor: 'var(--line)' }}>
        <div className="flex justify-around items-center py-2">
          {tabs.map(tb => (
            <button key={tb.id} onClick={() => setTab(tb.id)} className="flex flex-col items-center gap-1 p-2 flex-1" style={{ color: tab === tb.id ? 'var(--accent)' : 'var(--fg-secondary)' }}>
              <Icon name={tb.icon} size={20}/>
              <span className="text-[10px] font-mono">{tb.label}</span>
            </button>
          ))}
        </div>
      </nav>

      {showSettings && (
        <SpaceSettingsModal
          user={user}
          lang={lang}
          setLang={setLang}
          theme={theme}
          setTheme={setTheme}
          adhdProfile={adhdProfile}
          setAdhdProfile={setAdhdProfile}
          apiKey={apiKey}
          setApiKey={setApiKey}
          model={model}
          setModel={setModel}
          showCat={showCat}
          setShowCat={setShowCat}
          soundEnabled={soundEnabled}
          setSoundEnabled={setSoundEnabled}
          messy={messy}
          messyOverride={messyOverride}
          setMessyOverride={setMessyOverride}
          plan={plan}
          setShowWizard={setShowWizard}
          setShowUpgrade={setShowUpgrade}
          setOverlayPage={setOverlayPage}
          exportData={exportData}
          importData={importData}
          fileInputRef={fileInputRef}
          onUserUpdate={(updated) => { setUser(updated); if (onUserUpdate) onUserUpdate(updated); }}
          onLogout={() => { soundCtx.play('pop'); onLogout(); }}
          onClose={() => setShowSettings(false)}
        />
      )}

      {showWizard && (
        <ApiWizard
          apiKey={apiKey}
          setApiKey={setApiKey}
          onClose={() => setShowWizard(false)}
          lang={lang}
        />
      )}

      {showCat && <RoamingCat message={catMessage}/>}

      {showUpgrade && (
        <UpgradeSheet
          onClose={() => setShowUpgrade(false)}
          currentPlan={plan}
          setPlan={setPlan}
          lang={lang}
        />
      )}

      {overlayPage === 'privacy' && <PrivacyPolicy onBack={() => setOverlayPage(null)} lang={lang}/>}
      {overlayPage === 'terms' && <TermsOfUse onBack={() => setOverlayPage(null)} lang={lang}/>}
      {overlayPage === 'troubleshoot' && <Troubleshooting onBack={() => setOverlayPage(null)} lang={lang}/>}
    </div>
    </SoundContext.Provider>
  );
};

/* =================================================================
   ROOT APP — routing logic
================================================================= */
const App = () => {
  const [lang, setLang] = useGlobalStorage('lang', 'en');
  const [theme, setTheme] = useGlobalStorage('theme', 'light');
  const [view, setView] = useState('landing'); // landing | auth | app
  const [user, setUser] = useState(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    document.documentElement.setAttribute('lang', lang);
  }, [lang]);

  // check existing session on load
  useEffect(() => {
    const session = mockAuth.getSession();
    if (session) {
      setUser(session);
      setView('app');
    }
  }, []);

  const handleLogout = () => {
    mockAuth.logout();
    setUser(null);
    setView('landing');
  };

  if (view === 'landing') {
    return <Landing onEnter={() => setView('auth')} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme}/>;
  }

  if (view === 'auth') {
    return (
      <AuthPage
        onSuccess={(u) => { setUser(u); setView('app'); }}
        onSkip={() => { setUser(null); setView('app'); }}
        lang={lang}
        setLang={setLang}
      />
    );
  }

  return (
    <Dashboard
      user={user}
      lang={lang}
      setLang={setLang}
      theme={theme}
      setTheme={setTheme}
      onLogout={handleLogout}
      onUserUpdate={(updated) => setUser(updated)}
    />
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
